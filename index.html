<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Sharma — UI/UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Left-most quick menu (fixed to the screen): opens section panels directly. -->
  <nav id="side-menu" class="side-menu" hidden></nav>

  <main class="stage">
    <div class="scene-frame">
      <canvas id="scene" width="432" height="320"></canvas>

      <div id="loading" class="loading">
        <span class="blink">LOADING WORLD…</span>
      </div>

      <header class="hud hud-top" id="hud-top" hidden>
        <span class="hud-msg">Explore inside the house to know more about me</span>
      </header>

      <footer class="hud hud-bottom" id="hud-bottom" hidden>
        <span class="hud-hint">▶ use <b>WASD</b> or <b>arrow keys</b> to move around</span>
      </footer>

      <!-- Scene-transition fade overlay -->
      <div id="fade" class="scene-fade"></div>

      <!-- Floating interaction prompt, positioned over a hotspot in JS. -->
      <div id="prompt" class="prompt" hidden>
        <span class="prompt-key">E</span>
        <span class="prompt-label">Enter</span>
      </div>

      <!-- Start / title splash shown on first load, over the live scene. -->
      <div id="start-overlay" class="start-overlay" hidden>
        <p class="start-tagline">UI/UX, Product Design &amp; Design Systems portfolio</p>
        <div class="start-title">
          <span class="start-name">RHYTHM SHARMA</span>
          <span class="start-sub">— PORTFOLIO —</span>
        </div>
        <button id="start-btn" class="start-btn">LET'S GET GOING</button>
        <div class="start-foot">
          <span>No time to explore my portfolio?</span>
          <a href="https://www.linkedin.com/in/rhythmss" target="_blank" class="start-linkedin">LinkedIn</a>
        </div>
      </div>
    </div>

    <!-- Pixel-styled section panel opened from a hotspot. -->
    <div id="panel" class="panel-overlay" hidden>
      <div class="panel" role="dialog" aria-modal="true" aria-labelledby="panel-title">
        <button id="panel-close" class="panel-close" aria-label="Close">✕</button>
        <h2 id="panel-title" class="panel-title"></h2>
        <div id="panel-body" class="panel-body"></div>
      </div>
    </div>
  </main>

  <script src="src/main.js?v=59" type="module"></script>
</body>
</html>
